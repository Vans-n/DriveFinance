{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <!-- Responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h2>Criar Conta</h2>

        {% if messages %}
        <!-- Exibe mensagens (sucesso, erro, etc.) -->

            {% for message in messages %}
                <p class="msg-{{ message.tags }}">
                    {{ message }}
                </p>
            {% endfor %}

        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <!-- Proteção contra CSRF -->

            <div>
                <label for="username">Usuário</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    autocomplete="username"
                    required
                >
            </div>

            <div>
                <label for="email">E-mail</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    autocomplete="email"
                    required
                >
            </div>

            <div>
                <label for="password">Senha</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    minlength="6"
                    autocomplete="new-password"
                    required
                >
                <!-- Feedback de validação -->
                <small id="senha-feedback"></small>
            </div>

            <div>
                <label for="confirmar">Confirmar Senha</label>
                <input 
                    type="password" 
                    id="confirmar" 
                    name="confirmar" 
                    autocomplete="new-password"
                    required
                >
                <!-- Feedback de confirmação -->
                <small id="confirmar-feedback"></small>
            </div>

            <button type="submit">
                Cadastrar
            </button>
        </form>

        <p class="form-footer">
            Já tem conta? 
            <a href="{% url 'login' %}">Entrar</a>
        </p>
        <!-- Link para login -->
    </div>
</div>

<!-- Script para validação -->
<script>
const senha = document.getElementById("password");
const confirmar = document.getElementById("confirmar");

const senhaFeedback = document.getElementById("senha-feedback");
const confirmarFeedback = document.getElementById("confirmar-feedback");

// Validando tamanho da senha
senha.addEventListener("input", function () {

    if (senha.value.length < 6) {
        senhaFeedback.textContent = "Mínimo de 6 caracteres.";
        senhaFeedback.style.color = "#ff6b6b";
    } else {
        senhaFeedback.textContent = "✓ Senha válida.";
        senhaFeedback.style.color = "#69db7c";
    }
});

// Confirmação de senha
confirmar.addEventListener("input", function () {

    if (confirmar.value !== senha.value) {
        confirmarFeedback.textContent = "As senhas não coincidem.";
        confirmarFeedback.style.color = "#ff6b6b";
    } else {
        confirmarFeedback.textContent = "✓ Senhas coincidem.";
        confirmarFeedback.style.color = "#69db7c";
    }
});
</script>

</body>
</html>
