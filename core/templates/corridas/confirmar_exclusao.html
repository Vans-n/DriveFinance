{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="container">

<div class="card">
    <h2>Confirmar Exclusão</h2>

    <p><strong>Plataforma:</strong> {{ corrida.plataforma }}</p>
    <p><strong>Valor:</strong> R$ {{ corrida.valor }}</p>

    <form method="POST">
        {% csrf_token %}
        <button class="button" type="submit">Sim, excluir</button>
    </form>

    <br>
    <a class="button" href="/corridas/">Cancelar</a>
</div>

</div>
