<h2>Despesas</h2>

<a href="/despesas/nova/">Nova Despesa</a>

<ul>
{% for despesa in despesas %}
<li>
    {{ despesa.descricao }} - R$ {{ despesa.valor|floatformat:2 }}

    <a href="/despesas/editar/{{ despesa.id }}/">Editar</a>

    <form action="/despesas/excluir/{{ despesa.id }}/" method="POST" style="display:inline;">
        {% csrf_token %}
        <button type="submit" onclick="return confirm('Tem certeza que deseja excluir esta despesa?')">
            Excluir
        </button>
    </form>
</li>
{% empty %}
<li>Nenhuma despesa cadastrada</li>
{% endfor %}
</ul>

<a href="/dashboard/">Voltar ao Dashboard</a>
